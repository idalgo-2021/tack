name: tack
description: "Tack — быстрая фиксация момента"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2

  cupertino_icons: ^1.0.8

  flutter_riverpod: ^3.3.2
  riverpod_annotation: ^4.0.3

  sqflite: ^2.4.1
  path_provider: ^2.1.5
  path: ^1.9.1
  shared_preferences: ^2.3.4

  record: ^7.1.0
  audioplayers: ^6.4.0
  image_picker: ^1.1.2

  geolocator: ^13.0.2

  archive: ^3.6.1
  uuid: ^4.5.1
  file_picker: ^12.0.0-beta.5
  geocoding: ^4.0.0
  permission_handler: ^11.3.1
  share_plus: ^13.1.0
  flutter_staggered_grid_view: ^0.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  riverpod_generator: ^4.0.4
  build_runner: ^2.4.14

flutter:
  uses-material-design: true
  generate: true
